apiVersion: apps/v1
kind: Deployment
metadata: 
  name: argo-cd
spec: 
  replicas: 2
  selectors:
    Matchabels:
      app: argo-cd
  template:
    metadata: 
      labels:
        app: argo-cd
    spec:
      containers:
      - name: argo-cd
        image: nginx
        ports:
        -containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: argo-cd
spec:
  selector:
    app: argo-cd
    ports:
      - port: 80
        targetPort: 80
    type: clusterIP     