apiVersion: apps/v1
kind: Deployment
metadata:
  name: Affinity
spec:
  replicas: 2
  selector:
    matchLabels:
      app: Affinity
  template:
    metadata:
      labels:
        app: Affinity
    spec:
     affinity:
       podAffinity:
         requiredDuringSchedulingIgnoredDuringExecution:
         - labelSelector:
             matchExpressions:
             - key: app
               operator: In
               values:
               - affinity-app
           topologyKey: "kubernetes.io/hostname"
       containers:
       - name: nginx
         image: nginx   