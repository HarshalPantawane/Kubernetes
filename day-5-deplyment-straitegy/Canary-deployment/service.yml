apiVersion: v1 
kind: Service
metadata:
  name: canary-deployment-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: myapp
  ports:
  - name: nginx
    protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30080

