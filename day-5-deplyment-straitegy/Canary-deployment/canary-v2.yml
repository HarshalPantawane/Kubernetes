apiVersion: app/v1
kind: Deployment
metadata: 
  name: canary-v2-app
  namespace: default
  labels:
    app: myapp
spec:
  replicas: 1
  selector:
    matchLabels: 
      app: myapp
      version: v2 
  template: 
    metadata:
      labels:
        app: myapp        
        version: v2 
    spec:
      containers:
      - name: nginx
        image: nginx:1.3 
        ports: 
        - containerPort: 80

