apiVersion: app/v1
kind: Deployment
metadata:
  name: canary-v1-app
  namespace: default
  labels:
    app: myapp
spec:
  replicas: 9
  selector: 
    matchLabels:
      app: myapp
      version: v1
  template:
    metadata:
      labels:
        app: myapp
        version: v1
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80

# kubectl apply -f canary-v1.yml
