---
apiVersion: apps/v1
kind: Deployment
metadata: 
  name: busybox-deployment
  namespace: default
  labels: 
    app: busybox
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
    maxSurge: 25% 
    maxUnavailable: 25%
  selector:
    matchLabels:
      app: busybox
  template:
    metadata: 
      labels:
        app: busybox
    spec:
      containers:
      - name: busybox
        image: busybox:latest
        ports:
        - conatainerPort: 80        

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-deployment
  namespace: default
  labels:
    app: http
spec:
  replicas: 5
  strategy: 
    type: RollingUpdate
    rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%
  selector:
    maychLabels:
      app: http
  template:
    metadata: 
      labels: 
        app: http  
    spec: 
      containers:
      - name: http
        image: httpd:latest
        ports:
        - containerPort: 80

