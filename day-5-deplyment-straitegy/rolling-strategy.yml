apiVersion: app/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: default
  labels: nginx-deployment
spec:
  replicas: 5
  strategy:  
    type: RollingUpdate
    rollingUpdate:
    maxUnavailable: 50%
    maxSurge: 50%
  selector:
    matchLabels:
      app: nginx-deployment
  template:
    meatadata:
      labels: 
        app: nginx-deployment
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80  

# kubectl get deployment       / 
