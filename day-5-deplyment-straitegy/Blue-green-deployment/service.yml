apiVersion: v1 
kind: Service
metadata: 
  name: blue-green-service
  namespace: default
  labels: 
    app: myapp
spec: 
  selector:
      app: myapp
      version: blue
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer

---

apiVersion: v1 
kind: Deployment
metadata: 
  name: blue-green-service
  namespace: default
  labels:
    app: myapp
spec:
  selector:
    app: myapp
    version: green
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP           