apiVersion: apps/v1
kind: Deployment
metadata:
  name: green-deployment
  namespace: default
  labels:
    app: myapp
spec:
  replicas: 3
  selector:
    matchLabels: 
      app: myapp
      version: green 
  template:
    metadata: 
      labels:
        app: myapp
    spec:
      containers:
      - name: nginx
        image: nginx:1.0
        ports: 
        - containerPort: 80

# kubectl apply -f green.yml
# kubectl get deploy -A
# kubectl get po -o wide

