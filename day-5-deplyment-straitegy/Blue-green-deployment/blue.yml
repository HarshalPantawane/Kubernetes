apiVersinon: apps/v1
kind: Deployment
metadata: 
  name: blue-deplyment
  namespace: default
  labels:
    app: myapp
spec:
  replicas: 5
  selector:
    matchLabels:
      app: myapp
      version: blue
  template:
    metadata: 
      labels:
        app: myapp
        version: blue
    spec:
      containers:
      - name: nginx
        image: nginx:1.0
        ports: 
        - containerPort: 80            

