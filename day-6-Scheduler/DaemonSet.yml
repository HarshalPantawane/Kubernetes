apiVersion: apps/v1 
kind: DaemonSet
metadata: 
  name: daemonset-deployment
  namespace: default
  labels: 
    app: myapp
spec:
  selector:
    matchLabels:
      app: myapp
  template:
    metadata: 
      labels:
        app: myapp
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nginx-deployment
  namespace: default
  labels: 
    app: myapp
spec:
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels: 
        app: myapp
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80                    


# kubectl apply -f daemonset.yml
# kubectl get daemonsets or  ds

---
apiVersion: v1 
kind: Service
metadata:
  name: daemon-service
  namespace: default
spec:
  selector: 
    app: myapp
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP  