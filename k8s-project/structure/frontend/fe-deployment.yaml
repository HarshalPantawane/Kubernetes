apiVersion: v1
kind: Deployment
metadata:
  name: fe-deployment
  namespace: fe-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fe-deployment
  template:
    metadata:
      Labels: 
        app: fe-deployment
    spec:
      serviceAccountName: fe-sa
      containers: 
      - name: fe-container
        image: 890871562773.dkr.ecr.us-east-1.amazonaws.com/frontend-img
        env:
          - name: API_URL
            valueFrom:
              configurationKeyRef:
                name: fe-config
                key: backendEndpoint
        resources:
          requests:
            cpu: "10m"
            memory: "100mi"
          limits:
            cpu: "100m"
            memory: "200mi"
        livenessProbe: 
          httpget:
            path: /
            port: 8080
          initialDelaySecomds: 3
          periodSeconds: 3
          timeoutSeconds: 4
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 3
          timeoutSeconds: 4
          failureThreshold: 3
        startupProbe:
          httpGet: 
            path: /
            port: 8080
          initinalDelaySeconds: 3
          periodSeconds: 3
          timeoutSeconds: 4
          failureThreshold: 3
                    


---
apiVersion: v1
kind: Service
metadata:
  name: fe-service
  namespace: fe-ns
spec:
  selector:
    app: fe-deployment
    ports: 
    - port: 8081
      targetPort: 8080