apiVersion: apps/v1
kind: Deployment
metadata:
  name: be-deployment
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: be-deployment
  template:
    metadata:
      labels:
        app: be-deployment
    spec:
      serviceAccountName: be-sa
      containers:
      - name: be-container
        image: 890871562773.dkr.ecr.us-east-1.amazonaws.com/backend-img
        ports:
        - containerPort: 8084
        env:                          
        - name: MYSQL_HOST
          valueFrom:
            configMapKeyRef:
              name: datastore-be-cm
              key: mysqlHost
        - name: MYSQL_USERNAME
          valueFrom:
            configMapKeyRef:
              name: datastore-be-cm
              key: mysqlUname
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: datastore-be-secret
              key: mysqlPassword
        resources:
          requests:
            cpu: "10m"
            memory: "100Mi"
          limits: 
            cpu: "500m"
            memory: "500Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 8084
          initialDelaySeconds: 20
          periodSeconds: 3
          timeoutSeconds: 4
          failureThreshold: 3
        readinessProbe: 
          httpGet: 
            path: /
            port: 8084
          initialDelaySeconds: 20
          periodSeconds: 3
          timeoutSeconds: 4
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /
            port: 8084
          initialDelaySeconds: 20
          periodSeconds: 3
          timeoutSeconds: 4
          failureThreshold: 3                 

---

apiVersion: v1
kind: Service
metadata:
  name: be-service
  namespace: app
  annotations:
    prometheus.io/path: /actuator/prometheus
    prometheus.io/scrape: "true"
spec:
  selector:
    app: be-deployment
  ports:
    - port: 8081
      targetPort: 8084
        